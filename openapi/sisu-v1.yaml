openapi: 3.1.0
info:
  title: SISU API
  version: 1.0.0
  description: |
    SISU orchestration engine API. Manages work items, execution plans,
    agent runtime leases, inter-agent mail, and adapter registrations.

servers:
  - url: http://localhost:3000/v1
    description: Local development server

tags:
  - name: health
    description: Health and readiness checks
  - name: work-items
    description: Work item lifecycle management
  - name: plans
    description: Execution plan retrieval
  - name: runtime
    description: Runtime lease and agent run management
  - name: mail
    description: Inter-agent mail messaging
  - name: adapters
    description: External adapter registration

components:
  schemas:
    WorkItemStatus:
      type: string
      enum:
        - queued
        - ready
        - planning
        - in_progress
        - in_review
        - blocked
        - done
        - failed
        - cancelled

    MailType:
      type: string
      enum:
        - dispatch
        - status
        - result
        - question
        - error
        - worker_done
        - merge_ready
        - review_pass
        - review_fail
        - escalation

    MailPriority:
      type: string
      enum:
        - low
        - normal
        - high
        - urgent

    ModelTier:
      type: string
      enum:
        - strategic
        - execution
        - review
        - observation

    ExternalRef:
      type: object
      required:
        - system
        - id
      properties:
        system:
          type: string
          minLength: 1
        id:
          type: string
          minLength: 1
        url:
          type: string
          format: uri
        metadata:
          type: object
          additionalProperties: true

    WorkItem:
      type: object
      required:
        - id
        - title
        - status
        - version
        - requiredCapabilities
        - metadata
        - context
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          pattern: '^wrk_[0-9A-Z]{26}$'
          example: wrk_01HQZXVB3K5DFGHJKLMNPQRSTU
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: '#/components/schemas/WorkItemStatus'
        version:
          type: integer
          minimum: 0
        externalRef:
          $ref: '#/components/schemas/ExternalRef'
        requiredCapabilities:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
        assignedRole:
          type: string
        assignedRun:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateWorkItemBody:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        status:
          $ref: '#/components/schemas/WorkItemStatus'
        externalRef:
          $ref: '#/components/schemas/ExternalRef'
        requiredCapabilities:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
        assignedRole:
          type: string

    UpdateWorkItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/WorkItemStatus'
        externalRef:
          $ref: '#/components/schemas/ExternalRef'
        requiredCapabilities:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        context:
          type: object
          additionalProperties: true
        assignedRole:
          type: string
        assignedRun:
          type: string
        version:
          type: integer

    ExecutionPlanStepStatus:
      type: string
      enum:
        - pending
        - running
        - done
        - failed
        - skipped

    ExecutionPlanStep:
      type: object
      required:
        - id
        - workflowStepId
        - role
        - status
      properties:
        id:
          type: string
        workflowStepId:
          type: string
        role:
          type: string
        status:
          $ref: '#/components/schemas/ExecutionPlanStepStatus'
        runId:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        error:
          type: string
        output:
          type: object
          additionalProperties: true

    ExecutionPlan:
      type: object
      required:
        - id
        - workItemId
        - workflowTemplateId
        - status
        - steps
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          pattern: '^plan_[0-9A-Z]{26}$'
          example: plan_01HQZXVB3K5DFGHJKLMNPQRSTU
        workItemId:
          type: string
          pattern: '^wrk_[0-9A-Z]{26}$'
        workflowTemplateId:
          type: string
        status:
          $ref: '#/components/schemas/ExecutionPlanStepStatus'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ExecutionPlanStep'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TokenUsage:
      type: object
      required:
        - inputTokens
        - outputTokens
        - cacheCreationTokens
        - cacheReadTokens
      properties:
        inputTokens:
          type: integer
          minimum: 0
        outputTokens:
          type: integer
          minimum: 0
        cacheCreationTokens:
          type: integer
          minimum: 0
        cacheReadTokens:
          type: integer
          minimum: 0

    RuntimeLease:
      type: object
      required:
        - id
        - runId
        - role
        - model
        - tokenUsage
        - lastHeartbeat
        - active
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
          pattern: '^lease_[0-9A-Z]{26}$'
        runId:
          type: string
          pattern: '^run_[0-9A-Z]{26}$'
        role:
          type: string
        workItemId:
          type: string
        planId:
          type: string
        model:
          type: string
        tokenUsage:
          $ref: '#/components/schemas/TokenUsage'
        lastHeartbeat:
          type: string
          format: date-time
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    AgentMail:
      type: object
      required:
        - id
        - type
        - from
        - to
        - subject
        - body
        - read
        - priority
        - createdAt
      properties:
        id:
          type: string
          pattern: '^mail_[0-9A-Z]{26}$'
        type:
          $ref: '#/components/schemas/MailType'
        from:
          type: string
        to:
          type: string
        subject:
          type: string
        body:
          type: string
        payload:
          type: object
          additionalProperties: true
        workItemId:
          type: string
        planId:
          type: string
        read:
          type: boolean
        priority:
          $ref: '#/components/schemas/MailPriority'
        createdAt:
          type: string
          format: date-time

    SendMailBody:
      type: object
      required:
        - type
        - from
        - to
        - subject
        - body
      properties:
        type:
          $ref: '#/components/schemas/MailType'
        from:
          type: string
          minLength: 1
        to:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        body:
          type: string
        payload:
          type: object
          additionalProperties: true
        workItemId:
          type: string
        planId:
          type: string
        priority:
          $ref: '#/components/schemas/MailPriority'

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: object

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags:
        - health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - timestamp
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  /ready:
    get:
      operationId: getReady
      summary: Readiness check
      tags:
        - health
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ready
        '503':
          description: Service not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not ready

  /work-items:
    post:
      operationId: createWorkItem
      summary: Create a work item
      tags:
        - work-items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkItemBody'
      responses:
        '201':
          description: Work item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      operationId: listWorkItems
      summary: List work items
      tags:
        - work-items
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/WorkItemStatus'
        - name: assignedRole
          in: query
          schema:
            type: string
        - name: externalSystem
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of work items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /work-items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getWorkItem
      summary: Get a work item by ID
      tags:
        - work-items
      responses:
        '200':
          description: Work item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      operationId: updateWorkItem
      summary: Update a work item
      tags:
        - work-items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkItemBody'
      responses:
        '200':
          description: Work item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      operationId: cancelWorkItem
      summary: Cancel a work item (sets status to cancelled)
      tags:
        - work-items
      responses:
        '200':
          description: Work item cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkItem'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /work-items/{id}/dispatch:
    post:
      operationId: dispatchWorkItem
      summary: Dispatch a work item for execution
      tags:
        - work-items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Work item dispatched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionPlan'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /plans/{id}:
    get:
      operationId: getPlan
      summary: Get an execution plan by ID
      tags:
        - plans
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionPlan'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /runtime/runs:
    get:
      operationId: listRuns
      summary: List agent runtime leases
      tags:
        - runtime
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: workItemId
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: List of runtime leases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RuntimeLease'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /runtime/runs/{id}/stop:
    post:
      operationId: stopRun
      summary: Stop a running agent
      tags:
        - runtime
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            description: Lease ID (lease_xxx)
      responses:
        '200':
          description: Runtime lease updated (deactivated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLease'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mail:
    get:
      operationId: listMail
      summary: List agent mail messages
      tags:
        - mail
      parameters:
        - name: to
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: read
          in: query
          schema:
            type: boolean
        - name: workItemId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/MailType'
      responses:
        '200':
          description: List of mail messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentMail'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      operationId: sendMail
      summary: Send an agent mail message
      tags:
        - mail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMailBody'
      responses:
        '201':
          description: Mail sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMail'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /adapters/register:
    post:
      operationId: registerAdapter
      summary: Register an external adapter (not yet implemented)
      tags:
        - adapters
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
